# Training configuration shared across training scripts

train_split: 0.8          # 80% train / 20% test (temporal split, no shuffle)
horizons: [1, 2, 3, 4, 5] # forecast horizons in hours
target_station: "Dhompo"
data_path: "../data/data-clean.csv"

# Multi-source data configuration
data_sources:
  - path: "../data/data-clean.csv"
    format: csv
    label: "2022_clean"
  - path: "../data/Data generated 2023.xlsx"
    format: xlsx_generated
    label: "2023_generated"

include_rainfall: false  # toggle rainfall features (Curah hujan)

# Enhanced feature engineering flags
features:
  travel_time_lags: false      # B1: use empirical travel-time lags per station
  cumulative_rainfall: false   # B2: rolling sum rainfall 3h/6h/12h/24h
  interaction_features: false  # B3: upstream gradient + gradient×rainfall
  seasonal_features: false     # B4: wet_season flag + 7-day AMI

# Optuna hyperparameter tuning configuration
tuning:
  n_trials: 100               # number of Optuna trials per model×horizon
  cv_folds: 5                 # TimeSeriesSplit folds
  timeout: 3600               # max seconds per study (1 hour)
  direction: "maximize"       # maximize NSE
  pruner: "median"            # Optuna pruner type
